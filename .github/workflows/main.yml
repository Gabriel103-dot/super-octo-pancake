name: Windows 11 Game Streaming VM
on:
  workflow_dispatch:
    inputs:
      ts_authkey:
        description: 'Tailscale Auth Key (obtenha em https://login.tailscale.com/admin/settings/keys)'
        required: true
        type: string
      run_timeout:
        description: 'Tempo de execucao em minutos (padrao: 360 = 6 horas)'
        required: false
        default: '360'
        type: string

jobs:
  deploy-windows-streaming-vm:
    runs-on: windows-latest
    timeout-minutes: ${{ fromJSON(inputs.run_timeout || '360') }}
    
    steps:
    - name: Configurar ambiente Windows 11 para streaming
      shell: powershell
      run: |
        # ============================================
        # CONFIGURACAO BASICA DO SISTEMA
        # ============================================
        
        $username = "StreamUser";
        $password = "GamerPass123!";
        
        Write-Host "Criando usuario $username para RDP..." -ForegroundColor Cyan;
        
        $userExists = Get-LocalUser -Name $username -ErrorAction SilentlyContinue;
        if (-not $userExists) {
            $securePassword = ConvertTo-SecureString $password -AsPlainText -Force;
            New-LocalUser -Name $username -Password $securePassword -FullName "Game Streaming User";
            Add-LocalGroupMember -Group "Administrators" -Member $username;
            Add-LocalGroupMember -Group "Remote Desktop Users" -Member $username;
            Write-Host "Usuario $username criado com sucesso!" -ForegroundColor Green;
        } else {
            Write-Host "Usuario $username ja existe, mantendo..." -ForegroundColor Yellow;
        }
        
        Write-Host "Desativando Firewall do Windows..." -ForegroundColor Cyan;
        Set-NetFirewallProfile -Profile Domain,Public,Private -Enabled False;
        
        Write-Host "Otimizando Windows Defender..." -ForegroundColor Cyan;
        Set-MpPreference -DisableRealtimeMonitoring $true -ErrorAction SilentlyContinue;
        
        Write-Host "Configurando politica de senhas..." -ForegroundColor Cyan;
        secedit /export /cfg C:\secpol.cfg;
        (Get-Content C:\secpol.cfg).replace("PasswordComplexity = 1", "PasswordComplexity = 0").replace("MinimumPasswordLength = 7", "MinimumPasswordLength = 1") | Set-Content C:\secpol.cfg;
        secedit /configure /db C:\Windows\security\local.sdb /cfg C:\secpol.cfg /areas SECURITYPOLICY;
        Remove-Item C:\secpol.cfg -Force;
        
        Write-Host "Aplicando otimizacoes de performance..." -ForegroundColor Cyan;
        powercfg /setactive 8c5e7fda-e8bf-4a96-9a85-a6e23a8c635c;
        Set-ItemProperty -Path "HKCU:\Software\Microsoft\Windows\CurrentVersion\Explorer\VisualEffects" -Name "VisualFXSetting" -Value 2;
        
        $servicesToDisable = @("DiagTrack", "dmwappushservice", "WSearch", "lfsvc", "MapsBroker", "NetTcpPortSharing", "RemoteRegistry", "SharedAccess", "TrkWks", "WbioSrvc", "WMPNetworkSvc", "wuauserv");
        foreach ($service in $servicesToDisable) {
            Stop-Service -Name $service -Force -ErrorAction SilentlyContinue;
            Set-Service -Name $service -StartupType Disabled -ErrorAction SilentlyContinue;
        }
        
        $processesToKill = @("OneDrive*", "Teams*", "Skype*", "MicrosoftEdge*", "Xbox*", "YourPhone*", "Cortana*", "OfficeClickToRun*");
        foreach ($processPattern in $processesToKill) {
            Get-Process $processPattern -ErrorAction SilentlyContinue | Stop-Process -Force -ErrorAction SilentlyContinue;
        }
        
        Write-Host "Instalando runtimes essenciais..." -ForegroundColor Cyan;
        Set-ExecutionPolicy Bypass -Scope Process -Force;
        [System.Net.ServicePointManager]::SecurityProtocol = [System.Net.ServicePointManager]::SecurityProtocol -bor 3072;
        Invoke-Expression ((New-Object System.Net.WebClient).DownloadString('https://chocolatey.org/install.ps1'));
        
        $env:Path += ";C:\ProgramData\chocolatey\bin";
        
        choco install -y vcredist-all directx --ignore-checksums;
        
        Write-Host "Instalando drivers de audio virtual..." -ForegroundColor Cyan;
        $audioDriverUrl = "https://download.vb-audio.com/Download_CABLE/VBCABLE_Driver_Pack43.zip";
        $audioDriverPath = "C:\Temp\AudioDriver.zip";
        New-Item -ItemType Directory -Force -Path "C:\Temp" | Out-Null;
        Invoke-WebRequest -Uri $audioDriverUrl -OutFile $audioDriverPath;
        Expand-Archive -Path $audioDriverPath -DestinationPath "C:\Temp\AudioDriver" -Force;
        Start-Process -FilePath "C:\Temp\AudioDriver\VBCABLE_Setup_x64.exe" -ArgumentList "-i" -Wait -NoNewWindow;
        
        Write-Host "Instalando Sunshine Moonlight Stream Host..." -ForegroundColor Cyan;
        $sunshineUrl = "https://github.com/LizardByte/Sunshine/releases/latest/download/Sunshine-Windows.zip";
        $sunshinePath = "C:\Sunshine";
        $sunshineZip = "C:\Temp\Sunshine.zip";
        Invoke-WebRequest -Uri $sunshineUrl -OutFile $sunshineZip;
        Expand-Archive -Path $sunshineZip -DestinationPath $sunshinePath -Force;
        
        $sunshineShortcut = "$env:APPDATA\Microsoft\Windows\Start Menu\Programs\Startup\Sunshine.lnk";
        $WScriptShell = New-Object -ComObject WScript.Shell;
        $Shortcut = $WScriptShell.CreateShortcut($sunshineShortcut);
        $Shortcut.TargetPath = "$sunshinePath\sunshine.exe";
        $Shortcut.WorkingDirectory = $sunshinePath;
        $Shortcut.Save();
        
        $sunshineConfig = '{
          "apps": [
            {
              "name": "Desktop",
              "output": "",
              "cmd": "C:\\Windows\\System32\\mstsc.exe",
              "prep-cmd": []
            }
          ],
          "global_prep_cmd": [],
          "file_state": "/state.json",
          "credentials_file": "/credentials.json",
          "port": 47989,
          "pkey": "/sunshine.pem",
          "cert": "/sunshine.cert",
          "log_level": 2,
          "min_log_level": 2,
          "flags": {
            "amd_amf": true,
            "capture": "nvfbc",
            "encoder": "nvenc",
            "upnp": false
          },
          "qos": {
            "bitrate": 20000,
            "packet_loss": 0.02,
            "rtt": 100
          },
          "video": {
            "encoder": "nvenc",
            "fps": 60,
            "hevc_mode": 0,
            "bitrate": 20000
          }
        }'
        
        New-Item -ItemType Directory -Force -Path "$sunshinePath\config" | Out-Null;
        $sunshineConfig | Out-File -FilePath "$sunshinePath\config\sunshine.json" -Encoding ASCII;
        
        Start-Process -FilePath "$sunshinePath\sunshine.exe" -WorkingDirectory $sunshinePath;
        
        Write-Host "Instalando Tailscale para conectividade segura..." -ForegroundColor Cyan;
        $tailscaleInstaller = "C:\Temp\Tailscale.msi";
        Invoke-WebRequest -Uri "https://pkgs.tailscale.com/stable/tailscale-setup-latest-amd64.msi" -OutFile $tailscaleInstaller;
        Start-Process msiexec.exe -ArgumentList "/i `"$tailscaleInstaller`" /quiet" -Wait;
        
        Start-Process -FilePath "C:\Program Files\Tailscale\tailscale.exe" -ArgumentList "up --authkey ${{ inputs.ts_authkey }}" -Wait;
        
        Start-Sleep -Seconds 10;
        $tailscaleIP = & "C:\Program Files\Tailscale\tailscale.exe" ip -4;
        if (-not $tailscaleIP) {
            $tailscaleIP = "IP nao obtido - verifique a authkey";
        }
        
        Write-Host "============================================" -ForegroundColor Green;
        Write-Host "CONFIGURACAO COMPLETA!" -ForegroundColor Green;
        Write-Host "CONEXAO RDP:" -ForegroundColor Yellow;
        Write-Host "Endereco: $tailscaleIP" -ForegroundColor White;
        Write-Host "Usuario: $username" -ForegroundColor White;
        Write-Host "Senha: $password" -ForegroundColor White;
        Write-Host ""
        Write-Host "STREAMING:" -ForegroundColor Yellow;
        Write-Host "Sunshine Host: http://$tailscaleIP`:47989" -ForegroundColor White;
        Write-Host "============================================" -ForegroundColor Green;
        
    - name: Status Final e Keep-Alive
      shell: powershell
      run: |
        Write-Host "============================================" -ForegroundColor Blue;
        Write-Host "VM Windows 11 para Streaming Pronta!" -ForegroundColor Blue;
        Write-Host "A maquina ficara ativa por ${{ inputs.run_timeout || '360' }} minutos" -ForegroundColor Blue;
        Write-Host "============================================" -ForegroundColor Blue;
        
        $sunshineProcess = Get-Process sunshine -ErrorAction SilentlyContinue;
        if ($sunshineProcess) { Write-Host "Sunshine Status: ATIVO" -ForegroundColor Green; } 
        else { Write-Host "Sunshine Status: INATIVO" -ForegroundColor Red; }
        
        $tailscaleProcess = Get-Process tailscale -ErrorAction SilentlyContinue;
        if ($tailscaleProcess) { Write-Host "Tailscale Status: ATIVO" -ForegroundColor Green; } 
        else { Write-Host "Tailscale Status: INATIVO" -ForegroundColor Red; }
        
        Write-Host "Mantendo maquina ativa (Processo em Sleep)..." -ForegroundColor Cyan;
        $timeoutSeconds = [int]${{ inputs.run_timeout || '360' }} * 60;
        Start-Sleep -Seconds $timeoutSeconds;
        
